context:
  version: 0.1.0

package:
  name: vesselfm
  version: ${{ version }}

source:
  git: https://github.com/khanlab/vesselFM.git
  rev: 80a814b225773412f6969173fd652ce25870b859

build:
  script: ${{ PYTHON }} -m pip install .
  python:
    entry_points:
    - vesselfm-infer = vesselfm.cli:main
  noarch: python

requirements:
  host:
  - python >=3.11
  - hatchling
  - wheel
  - pip
  run:
  - python >=3.11,<3.12
  - monai >=1.5.2,<2
  - hydra-core >=1.3.2,<2
  - scikit-image >=0.26.0,<0.27
  - scikit-learn >=1.8.0,<2
  - simpleitk >=2.4.0,<3
  - tqdm >=4.67.2,<5
  - lightning >=2.6.0,<3
  - wandb >=0.24.1,<0.25
  - numpy >=2.4.2,<3
  - matplotlib >=3.10.8,<4
  - tensorboard >=2.20.0,<3
  - huggingface_hub >=1.3.7,<2
  - nibabel >=5.3.2,<6
  - gpustat >=1.1.1,<2
  - omegaconf >=2.3.0,<3
  - dask >=2025.5.1,<2026
  - distributed >=2025.5.1,<2026

tests:
- python:
    imports:
    - vesselfm
    pip_check: true

about:
  summary: VesselFM is a foundation model for universal 3D blood vessel segmentation
  description: VesselFM is a foundation model for universal 3D blood vessel segmentation
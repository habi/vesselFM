defaults:
  - hydra: default
  - model: dyn_unet_base
  - _self_

# i/o
image_path: /path/to/image_folder #TODO
image_file_ending: nii.gz
output_folder: /path/to/output_folder # TODO
file_app: ""

mask_path: null
round_to: 2

# model & ckpt
device: cuda:0
ckpt_path: /path/to/ckpt.pt

# sliding window inferer
batch_size: 16
patch_size: [128, 128, 128]
overlap: 0.5
mode: "constant"
sigma_scale: 0.125
padding_mode: "constant"

# eval & reproducibility
seed: 404

# dask configuration
# Dask is used for parallel image loading and preprocessing with thread-based parallelism.
# The n_workers setting determines the number of parallel tasks for image loading.
dask:
  enabled: true
  n_workers: null  # null means auto-detect based on available CPUs
  # Note: The following settings are placeholders for future distributed cluster support
  # and currently have no effect with the default thread-based scheduler.
  threads_per_worker: 2  # Not yet implemented - reserved for future distributed cluster
  memory_limit: "auto"  # Not yet implemented - reserved for future distributed cluster

# standard pre-processing transforms
transforms_config:
  - EnsureChannelFirst:
      channel_dim: "no_channel"
  - ScaleIntensityRangePercentiles:
      lower: 1
      upper: 99
      b_min: 0
      b_max: 1
      clip: true
  - ToTensor:
      device: null

# test time augmentation
tta:
  scales: [1] #[0.5, 1, 1.5]
  invert: false
  invert_mean_thresh: 0.5
  equalize_hist: false
  hist_bins: 100

# post-processing
post:
  apply: false
  small_objects_min_size: 500
  small_objects_connectivity: 3

# merging
merging:
  threshold: 0.5
  max: false